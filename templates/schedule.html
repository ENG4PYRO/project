<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الجدول الدراسي</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
    <h2>📚 الجدول الدراسي</h2>
    <form class="add-form" action="/schedule" method="POST">
        <select name="day" required>
            <option value="" disabled selected>اختر اليوم</option>
            <option value="السبت">السبت</option>
            <option value="الأحد">الأحد</option>
            <option value="الاثنين">الاثنين</option>
            <option value="الثلاثاء">الثلاثاء</option>
            <option value="الأربعاء">الأربعاء</option>
            <option value="الخميس">الخميس</option>
            <option value="الجمعة">الجمعة</option>
        </select>
        <input type="text" name="subject" placeholder="اسم المادة (مثال: رياضيات)" required>
        <input type="time" name="class_time" required>
        <button type="submit" class="btn-add">إضافة الحصة</button>
    </form>
    <hr>
    <div id="scheduleList">
        {% if schedule_items %}
            {% for item in schedule_items %}
            <div class="item-box">
                <div class="details">
                    <span><strong>{{ item[1] }}</strong></span>
                    <span>المادة: {{ item[2] }}</span>
                    <span>الوقت: {{ item[3] }}</span>
                </div>
                <form action="/delete_schedule/{{ item[0] }}" method="POST" style="margin:0;">
                    <button type="submit" class="btn-delete">حذف</button>
                </form>
            </div>
            {% endfor %}
        {% else %}
            <p class="empty-msg">لا توجد حصص في جدولك حالياً.</p>
        {% endif %}
    </div>
    <a class="btn-back" href="/">🔙 العودة للرئيسية</a>
</div>
</body>
</html>
