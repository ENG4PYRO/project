<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>برمودا تايم</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
    <h2>⏳ برمودا تايم</h2>
    <div class="time" id="time">00:00</div>
    <div class="controls">
        <button onclick="startTimer()">ابدأ</button>
        <button class="btn-stop" onclick="stopTimer()">إيقاف</button>
    </div>
    <a class="btn-back" href="/">🔙 العودة للرئيسية</a>
</div>
<script>
    let timer;
    let seconds = 0;
    let isRunning = false;
    function startTimer() {
        if (isRunning) return; 
        isRunning = true;
        timer = setInterval(() => {
            seconds++;
            document.getElementById("time").innerText = formatTime(seconds);
        }, 1000);
    }
    function stopTimer() {
        clearInterval(timer);
        isRunning = false;
    }
    function formatTime(totalSeconds) {
        const minutes = Math.floor(totalSeconds / 60);
        const secs = totalSeconds % 60;
        return `${String(minutes).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
    }
</script>
</body>
</html>
