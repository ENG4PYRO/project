<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
    <h2>إنشاء حساب</h2>
    <form action="/signup" method="POST">
        <input type="text" name="fullname" placeholder="الاسم الكامل" required>
        <input type="email" name="email" placeholder="البريد الإلكتروني" required>
        <input type="password" name="password" placeholder="كلمة المرور" required>
        <input type="password" name="confirmpassword" placeholder="تأكيد كلمة المرور" required>
        <button type="submit">تسجيل</button>
    </form>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <div class="login-link" style="margin-top: 20px; font-size: 14px; color: #555;">
        لديك حساب بالفعل؟ <a href="/login" style="color: #4353ff; font-weight: bold;">تسجيل الدخول</a>
    </div>
</div>
</body>
</html>
