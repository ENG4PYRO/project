<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعديل المهمة</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
    <h2 style="color: #34c759;">✏️ تعديل المهمة</h2>
    <form class="add-form" action="/edit_task/{{ task[0] }}" method="POST">
        <input type="text" name="title" value="{{ task[1] }}" required>
        <div class="row">
            <input type="date" name="task_date" value="{{ task[2] }}" required>
            <input type="time" name="task_time" value="{{ task[3] }}">
        </div>
        <div class="row">
            <input type="text" name="duration" value="{{ task[4] }}" placeholder="المدة (مثال: 2)">
            <select name="task_type" required>
                <option value="واجب" {% if task[5] == 'واجب' %}selected{% endif %}>واجب</option>
                <option value="مهمة" {% if task[5] == 'مهمة' %}selected{% endif %}>مهمة</option>
                <option value="مشروع" {% if task[5] == 'مشروع' %}selected{% endif %}>مشروع</option>
                <option value="اختبار" {% if task[5] == 'اختبار' %}selected{% endif %}>اختبار</option>
                <option value="مراجعة" {% if task[5] == 'مراجعة' %}selected{% endif %}>مراجعة</option>
            </select>
        </div>
        <button type="submit" class="btn" style="background: #34c759;">حفظ التعديلات</button>
    </form>
    <a class="btn-back" style="background: #f0f0f0; color: #333;" href="/tasks">الغاء والعودة</a>
</div>
</body>
</html>
