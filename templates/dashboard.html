<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإحصائيات</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
    <h2>📊 إحصائيات {{ fullname }}</h2>
    <div class="stat-grid">
        <div class="stat-card">
            <span class="stat-value">{{ total_tasks }}</span>
            <span class="stat-label">إجمالي المهام</span>
        </div>
        <div class="stat-card green">
            <span class="stat-value">{{ completed_count }}</span>
            <span class="stat-label">المهام المنجزة</span>
        </div>
        <div class="stat-card orange">
            <span class="stat-value">{{ total_hours }}</span>
            <span class="stat-label">ساعات الدراسة</span>
        </div>
        <div class="stat-card red">
            <span class="stat-value">{{ total_exams }}</span>
            <span class="stat-label">الامتحانات القادمة</span>
        </div>
    </div>
    <a class="btn-back" href="/">🔙 العودة للرئيسية</a>
</div>
</body>
</html>
