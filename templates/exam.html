<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الامتحانات</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
    <h2>📘 الامتحانات</h2>
    <form class="add-form" action="/exam" method="POST">
        <input type="text" name="subject" placeholder="مادة الامتحان (مثال: فيزياء)" required>
        <div class="row">
            <input type="date" name="exam_date" required>
            <input type="time" name="exam_time" required>
        </div>
        <select name="reminder_hours" required style="background-color: #eef1ff;">
            <option value="0.5">تذكير قبل نصف ساعة</option>
            <option value="1">تذكير قبل ساعة</option>
            <option value="2" selected>تذكير قبل ساعتين</option>
            <option value="12">تذكير قبل 12 ساعة</option>
            <option value="24">تذكير قبل يوم</option>
            <option value="48">تذكير قبل يومين</option>
        </select>
        <button type="submit" class="btn-add">إضافة الامتحان</button>
    </form>
    <hr>
    <div id="examList">
        {% if exam_items %}
            {% for item in exam_items %}
            <div class="item-box exam">
                <div class="details">
                    <span style="font-weight: bold; color: #d32f2f; margin-bottom: 5px;">امتحان {{ item[1] }}</span>
                    <span>التاريخ: {{ item[2] }}</span>
                    <span>الوقت: {{ item[3] }}</span>
                    <span style="font-size: 12px; color: #888; font-weight: bold; margin-top: 5px;">🔔 تذكير قبل: {{ item[4] }} ساعة</span>
                </div>
                <form action="/delete_exam/{{ item[0] }}" method="POST" style="margin:0;">
                    <button type="submit" class="btn-delete">حذف</button>
                </form>
            </div>
            {% endfor %}
        {% else %}
            <p class="empty-msg">لا توجد امتحانات قريبة، استمتع بوقتك! 🎉</p>
        {% endif %}
    </div>
    <a class="btn-back" href="/">🔙 العودة للرئيسية</a>
</div>
</body>
</html>
